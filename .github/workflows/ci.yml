name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-format:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      # ESLint is reported but not gated on for now — frontend has a
      # backlog of `any`/unused-import warnings the cleanup of which is
      # tracked separately. Prettier IS gated (cheap to keep clean).
      - name: Run ESLint (report only)
        run: npm run lint || true

      - name: Check Prettier
        run: npm run format:check

      - name: TypeScript type check (backend)
        run: cd backend && npm run typecheck || true

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Run tests
        run: npm run test:cov || true

      # Codecov upload disabled — there's no Codecov token configured
      # and the action used to fail the job when the upload couldn't
      # complete. Re-enable once tests + coverage are wired up.
      # - name: Upload coverage to Codecov
      #   uses: codecov/codecov-action@v4
      #   with:
      #     files: ./coverage/lcov.info
      #     flags: unittests
      #     name: codecov-umbrella
      #     fail_ci_if_error: false

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: npm audit (root)
        run: npm audit --audit-level=moderate || true

      - name: npm audit (backend)
        run: cd backend && npm audit --audit-level=moderate || true

      - name: npm audit (frontend)
        run: cd frontend && npm audit --audit-level=moderate || true

  build:
    name: Build
    needs: [lint-and-format, test, security]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm ci --legacy-peer-deps

      - name: Install backend dependencies
        run: cd backend && npm ci --legacy-peer-deps

      - name: Install frontend dependencies
        run: cd frontend && npm ci --legacy-peer-deps

      - name: Build backend
        run: npm run build:backend

      - name: Build frontend
        run: npm run build:frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: |
            backend/dist
            frontend/.next
