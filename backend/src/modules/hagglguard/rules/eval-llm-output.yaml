# HagglGuard custom rule: detect eval/exec on data that looks like
# LLM output. The rule is intentionally aggressive — any eval at all
# in an AI agent codebase is a finding because we cannot statically
# prove the input is sanitised.
#
# Triggers in JS/TS/Python. We don't try to taint-track here; that's
# the job of the Claude pass that runs in parallel.

rules:
  - id:  haggl-eval-llm-output-js
    message: >-
      eval() / new Function() with arbitrary input is a remote-code-execution
      sink. In an AI agent context the input is often LLM-generated and
      attacker-controllable via prompt injection. Replace with a parser or
      a safe sandbox.
    severity: ERROR
    languages: [javascript, typescript]
    metadata:
      category: security
      cwe: 'CWE-95: Improper Neutralization of Directives in Dynamically Evaluated Code'
       haggl_severity: CRITICAL
       haggl_fix: >-
        Replace eval/new Function with a safe parser (JSON.parse for data,
        or a sandboxed VM with no host bindings for code).
    pattern-either:
      - pattern: eval(...)
      - pattern: new Function(...)
      - patterns:
          - pattern: $X.eval(...)
          - metavariable-pattern:
              metavariable: $X
              patterns:
                - pattern-either:
                    - pattern: window
                    - pattern: globalThis

  - id:  haggl-exec-llm-output-py
    message: >-
      exec() / eval() in Python with non-literal input is a remote-code-execution
      sink. Treat any LLM-derived string as attacker-controlled. Use a parser,
      restricted-eval (asteval), or a sandbox.
    severity: ERROR
    languages: [python]
    metadata:
       haggl_severity: CRITICAL
       haggl_fix: >-
        Replace exec/eval with a parser (json.loads / ast.literal_eval) or
        an explicit allowlist.
    pattern-either:
      - pattern: eval(...)
      - pattern: exec(...)
      - pattern: __import__(...)
