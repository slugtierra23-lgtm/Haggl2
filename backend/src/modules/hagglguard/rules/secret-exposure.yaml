# HagglGuard custom rule: detect hardcoded secrets / API keys.
# Common shapes only — Semgrep's built-in secrets ruleset covers
# the long tail when we run with --config=auto.

rules:
  - id:  haggl-hardcoded-api-key
    message: >-
      Hardcoded API key / token. Move it to an environment variable so it
      isn't shipped in the marketplace package.
    severity: ERROR
    languages: [javascript, typescript, python, generic]
    metadata:
       haggl_severity: HIGH
       haggl_fix: >-
        Read this from process.env.* (or os.environ for Python). Never hardcode
        provider keys in code — anyone who downloads the agent can use them.
    pattern-regex: >-
      (?i)(?:api[_-]?key|secret[_-]?key|access[_-]?token|bearer[_-]?token|openai[_-]?key|anthropic[_-]?key|stripe[_-]?key)\s*[:=]\s*["'][A-Za-z0-9_\-]{20,}["']

  - id:  haggl-private-key-pem
    message: >-
      Private key embedded in source. Wallet private keys / TLS keys must
      live outside the repo (KMS, env var, secret manager).
    severity: ERROR
    languages: [generic]
    metadata:
       haggl_severity: CRITICAL
       haggl_fix: >-
        Move the key to a secret manager and load it at runtime. If this is
        committed to a public repo, rotate it immediately.
    pattern-regex: >-
      -----BEGIN (?:RSA |EC |OPENSSH )?PRIVATE KEY-----
