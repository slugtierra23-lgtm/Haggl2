# HagglGuard custom rule: detect agents that execute arbitrary
# shell / spawn / network calls without an allowlist. In an AI agent
# context, the LLM frequently controls these calls — without an
# allowlist they're trivially exploitable via prompt injection.

rules:
  - id:  haggl-shell-no-allowlist-js
    message: >-
      child_process spawn/exec without an obvious allowlist. In an AI agent,
      the command often comes from the LLM — gate on a fixed allowlist of
      binaries (e.g. ['ls', 'cat']) before executing.
    severity: WARNING
    languages: [javascript, typescript]
    metadata:
       haggl_severity: HIGH
       haggl_fix: >-
        Validate the command name against a hardcoded array of allowed
        executables before passing it to spawn / exec. Refuse unknown ones.
    pattern-either:
      - pattern: |
          require('child_process').exec(...)
      - pattern: |
          require('child_process').spawn(...)
      - pattern: |
          import('child_process').exec(...)
      - pattern: |
          execSync(...)

  - id:  haggl-shell-no-allowlist-py
    message: >-
      subprocess.* with shell=True or arbitrary command list. AI agents
      should validate against a fixed allowlist of binaries before exec.
    severity: WARNING
    languages: [python]
    metadata:
       haggl_severity: HIGH
       haggl_fix: >-
        Pass a fixed list of strings (no shell=True). Validate args[0]
        against an allowlist before calling subprocess.run.
    pattern-either:
      - pattern: subprocess.run($..., shell=True, ...)
      - pattern: subprocess.Popen($..., shell=True, ...)
      - pattern: subprocess.call($..., shell=True, ...)
      - pattern: os.system(...)
